<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sandy Stuvik | Official Demo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>body { overflow-x: hidden; }</style>
</head>
<body class="bg-zinc-900 text-white font-sans antialiased min-h-screen flex flex-col">

    <nav class="bg-black/80 backdrop-blur-md fixed w-full z-50 border-b border-red-600/30">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center cursor-pointer shrink-0 mr-2" onclick="showSection('home')">
                    <span class="font-bold text-lg md:text-xl tracking-wider uppercase text-red-500">Sandy<span class="text-white hidden sm:inline">Stuvik</span></span>
                </div>
                
                <div class="flex items-center space-x-3 md:space-x-6">
                    <button onclick="showSection('home')" id="nav-home" class="text-red-500 hover:text-red-400 uppercase text-xs md:text-sm font-bold transition-colors">News</button>
                    <button onclick="showSection('shop')" id="nav-shop" class="text-gray-300 hover:text-white uppercase text-xs md:text-sm font-bold transition-colors">Shop</button>
                    
                    <button onclick="showSection('cart')" class="relative flex items-center bg-zinc-800 hover:bg-red-600 text-white px-3 py-1.5 md:px-4 md:py-2 rounded transition-colors shadow-lg shadow-red-600/30">
                        <svg class="w-4 h-4 md:w-5 md:h-5 mr-1 md:mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
                        <span class="text-xs md:text-sm">Cart</span> 
                        <span id="cart-count" class="absolute -top-2 -right-2 bg-red-500 text-white text-[10px] md:text-xs font-bold w-4 h-4 md:w-5 md:h-5 flex items-center justify-center rounded-full">0</span>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <main class="relative w-full flex-grow pt-16">
        
        <section id="section-home" class="absolute w-full transition-all duration-500 ease-in-out transform translate-x-0 opacity-100 z-10">
            <div class="relative pt-10 pb-16 md:pt-16 md:pb-20 overflow-hidden">
                <img src="https://images.unsplash.com/photo-1568605117036-5fe5e7bab0b7?auto=format&fit=crop&w=2070&q=80" class="absolute inset-0 w-full h-full object-cover opacity-30">
                <div class="relative z-20 max-w-7xl mx-auto px-4 text-center py-16 md:py-20">
                    <h1 class="text-4xl sm:text-5xl md:text-7xl font-extrabold uppercase tracking-tight text-white mb-4">Triple TSS <span class="text-red-600 block sm:inline">Champion</span></h1>
                </div>
            </div>
            <div class="max-w-7xl mx-auto px-4 py-10 md:py-16">
                <h2 class="text-2xl md:text-3xl font-bold uppercase border-l-4 border-red-600 pl-4 mb-6 md:mb-8">Latest News</h2>
                <div id="news-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 md:gap-8"></div>
            </div>
        </section>

        <section id="section-shop" class="absolute w-full transition-all duration-500 ease-in-out transform translate-x-full opacity-0 pointer-events-none z-0">
            <div class="max-w-7xl mx-auto px-4 py-10 md:py-16">
                <h1 class="text-3xl md:text-4xl font-black uppercase mb-8 md:mb-12 border-l-8 border-red-600 pl-4 md:pl-6">Merchandise</h1>
                <div id="product-container" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 md:gap-8"></div>
            </div>
        </section>

        <section id="section-cart" class="absolute w-full transition-all duration-500 ease-in-out transform translate-x-full opacity-0 pointer-events-none z-0">
            <div class="max-w-4xl mx-auto px-4 py-10 md:py-16">
                <h1 class="text-2xl md:text-3xl font-black uppercase mb-6 md:mb-8 border-b border-zinc-700 pb-4">Your Cart</h1>
                <div id="cart-items-container" class="space-y-4 mb-8"></div>
                <div class="bg-zinc-800 p-6 rounded-lg text-right">
                    <p class="text-lg md:text-xl text-gray-400">Total Amount</p>
                    <p id="cart-total" class="text-3xl md:text-4xl font-black text-red-500 my-2">฿0</p>
                    <button onclick="showSection('checkout')" id="btn-checkout" class="mt-4 bg-red-600 hover:bg-red-700 text-white font-bold py-3 px-8 rounded uppercase w-full sm:w-auto transition-colors hidden">Proceed to Checkout &rarr;</button>
                </div>
            </div>
        </section>

        <section id="section-checkout" class="absolute w-full transition-all duration-500 ease-in-out transform translate-x-full opacity-0 pointer-events-none z-0">
            <div class="max-w-3xl mx-auto px-4 py-10 md:py-16">
                <h1 class="text-2xl md:text-3xl font-black uppercase mb-6 md:mb-8 border-l-8 border-red-600 pl-4">Checkout</h1>
                <form id="checkout-form" onsubmit="submitOrder(event)" class="bg-zinc-800 p-6 md:p-8 rounded-xl border border-zinc-700 space-y-4 md:space-y-6">
                    <div>
                        <label class="block text-gray-400 text-sm font-bold mb-2">Full Name</label>
                        <input type="text" id="cust-name" required class="w-full bg-zinc-900 text-white border border-zinc-700 rounded p-3 focus:border-red-500 outline-none text-sm md:text-base">
                    </div>
                    <div>
                        <label class="block text-gray-400 text-sm font-bold mb-2">Shipping Address</label>
                        <textarea id="cust-address" required rows="3" class="w-full bg-zinc-900 text-white border border-zinc-700 rounded p-3 focus:border-red-500 outline-none text-sm md:text-base"></textarea>
                    </div>
                    <div>
                        <label class="block text-gray-400 text-sm font-bold mb-2">Payment Method</label>
                        <select id="payment-method" onchange="toggleSlipUpload()" class="w-full bg-zinc-900 text-white border border-zinc-700 rounded p-3 focus:border-red-500 outline-none text-sm md:text-base">
                            <option value="Bank Transfer">Bank Transfer (QR PromptPay)</option>
                            <option value="Credit Card">Credit Card (Demo)</option>
                        </select>
                    </div>
                    
                    <div id="slip-upload-section" class="bg-zinc-900 p-4 md:p-6 rounded border border-dashed border-zinc-600 text-center">
                        <p class="text-red-500 font-bold mb-2 text-sm md:text-base">Scan to Pay: 08X-XXX-XXXX</p>
                        <label class="block text-gray-400 text-xs md:text-sm mb-4">Please upload your transfer slip</label>
                        <input type="file" id="slip-file" accept="image/*" class="w-full text-xs md:text-sm text-gray-400 file:mr-4 file:py-2 file:px-4 file:rounded file:border-0 file:font-semibold file:bg-red-600 file:text-white hover:file:bg-red-700">
                    </div>

                    <button type="submit" class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-3 md:py-4 rounded uppercase transition-colors text-base md:text-lg shadow-lg shadow-red-600/20">Confirm & Pay <span id="checkout-total"></span></button>
                </form>
            </div>
        </section>

        <section id="section-success" class="absolute w-full transition-all duration-500 ease-in-out transform translate-x-full opacity-0 pointer-events-none z-0">
            <div class="max-w-2xl mx-auto px-4 py-20 md:py-32 text-center">
                <div class="w-20 h-20 md:w-24 md:h-24 bg-green-500 rounded-full flex items-center justify-center mx-auto mb-6 md:mb-8 shadow-lg shadow-green-500/30">
                    <svg class="w-10 h-10 md:w-12 md:h-12 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
                </div>
                <h1 class="text-3xl md:text-4xl font-black uppercase mb-4">Order Received!</h1>
                <p class="text-lg md:text-xl text-gray-400 mb-8">Thank you for your purchase.</p>
                <div class="bg-zinc-800 p-4 md:p-6 rounded-lg inline-block text-left mb-8 border border-zinc-700 w-full sm:w-auto">
                    <p class="text-sm md:text-base text-gray-400">Order ID: <span id="success-id" class="text-white font-bold">#---</span></p>
                    <p class="text-sm md:text-base text-gray-400 mt-2">Status: <span id="success-status" class="text-yellow-500 font-bold">Pending Review</span></p>
                </div>
                <br>
                <button onclick="showSection('shop')" class="w-full sm:w-auto bg-zinc-800 hover:bg-zinc-700 text-white font-bold py-3 px-8 rounded uppercase transition-colors">Continue Shopping</button>
            </div>
        </section>

    </main>

    <script>
        let cart = [];
        let total = 0;
        const sections = ['home', 'shop', 'cart', 'checkout', 'success'];

        document.addEventListener('DOMContentLoaded', async () => {
            loadNews();
            loadProducts();
        });

        // --- Navigation Logic ---
        function showSection(targetId) {
            sections.forEach(id => {
                const el = document.getElementById(`section-${id}`);
                if (id === targetId) {
                    el.classList.replace('translate-x-full', 'translate-x-0') || el.classList.replace('-translate-x-full', 'translate-x-0');
                    el.classList.replace('opacity-0', 'opacity-100');
                    el.classList.remove('pointer-events-none', 'z-0');
                    el.classList.add('z-10');
                } else {
                    const isLeft = sections.indexOf(id) < sections.indexOf(targetId);
                    el.classList.replace('translate-x-0', isLeft ? '-translate-x-full' : 'translate-x-full');
                    el.classList.replace('opacity-100', 'opacity-0');
                    el.classList.add('pointer-events-none', 'z-0');
                    el.classList.remove('z-10');
                }
            });
            window.scrollTo({ top: 0, behavior: 'smooth' });
            
            // อัปเดตสี Navbar (แก้บัคการใส่คลาสผิดในมือถือ)
            if(targetId === 'home' || targetId === 'shop') {
                document.getElementById('nav-home').className = targetId === 'home' ? "text-red-500 uppercase text-xs md:text-sm font-bold transition-colors" : "text-gray-300 hover:text-white uppercase text-xs md:text-sm font-bold transition-colors";
                document.getElementById('nav-shop').className = targetId === 'shop' ? "text-red-500 uppercase text-xs md:text-sm font-bold transition-colors" : "text-gray-300 hover:text-white uppercase text-xs md:text-sm font-bold transition-colors";
            }
        }

        async function loadNews() {
            try {
                const res = await fetch('/api/news');
                const news = await res.json();
                document.getElementById('news-container').innerHTML = news.map(n => `
                    <div class="bg-zinc-800 rounded-lg overflow-hidden border border-zinc-700 hover:border-red-500 transition-colors">
                        <img src="${n.image_url}" class="w-full h-48 object-cover">
                        <div class="p-6"><h3 class="font-bold mb-2 text-base md:text-lg">${n.title}</h3><p class="text-xs md:text-sm text-gray-400 line-clamp-2">${n.content}</p></div>
                    </div>`).join('');
            } catch (e) {}
        }

        async function loadProducts() {
            try {
                const res = await fetch('/api/products');
                const products = await res.json();
                document.getElementById('product-container').innerHTML = products.map(p => `
                    <div class="bg-zinc-800 border border-zinc-700 rounded-xl overflow-hidden">
                        <div class="h-56 md:h-64 bg-white p-4"><img src="${p.image_url}" class="w-full h-full object-contain"></div>
                        <div class="p-5 md:p-6">
                            <h3 class="font-bold uppercase mb-4 text-sm md:text-base">${p.name}</h3>
                            <div class="flex justify-between items-center">
                                <span class="text-lg md:text-xl font-black text-red-500">฿${p.price.toLocaleString()}</span>
                                <button onclick="addToCart(${p.id}, '${p.name}', ${p.price}, '${p.image_url}')" class="bg-zinc-100 text-black text-[10px] md:text-xs font-bold px-3 py-2 rounded uppercase hover:bg-red-600 hover:text-white transition-colors">Add</button>
                            </div>
                        </div>
                    </div>`).join('');
            } catch (e) {}
        }

        function addToCart(id, name, price, img) {
            cart.push({ id, name, price, img });
            updateCartUI();
            const btn = document.getElementById('cart-count');
            btn.classList.add('scale-150');
            setTimeout(() => btn.classList.remove('scale-150'), 200);
        }

        function removeFromCart(index) {
            cart.splice(index, 1);
            updateCartUI();
        }

        function updateCartUI() {
            document.getElementById('cart-count').innerText = cart.length;
            total = cart.reduce((sum, item) => sum + item.price, 0);
            
            const container = document.getElementById('cart-items-container');
            if (cart.length === 0) {
                container.innerHTML = '<p class="text-gray-400 text-center py-8">Your cart is empty.</p>';
                document.getElementById('btn-checkout').classList.add('hidden');
            } else {
                // ปรับให้ตะกร้าสินค้าเรียงแบบกล่องซ้อนกันในมือถือ เพื่อป้องกันข้อความล้นจอ
                container.innerHTML = cart.map((item, index) => `
                    <div class="flex flex-col sm:flex-row sm:items-center justify-between bg-zinc-800 p-4 rounded-lg border border-zinc-700 gap-4">
                        <div class="flex items-center w-full sm:w-auto">
                            <img src="${item.img}" class="w-16 h-16 object-contain bg-white rounded p-1 mr-4 shrink-0">
                            <p class="font-bold text-sm md:text-base line-clamp-2">${item.name}</p>
                        </div>
                        <div class="flex items-center justify-between w-full sm:w-auto">
                            <span class="text-red-500 font-bold mr-4 sm:mr-6 text-sm md:text-base">฿${item.price.toLocaleString()}</span>
                            <button onclick="removeFromCart(${index})" class="text-zinc-500 hover:text-red-500 text-xl font-bold bg-zinc-900 w-8 h-8 rounded-full flex items-center justify-center">&times;</button>
                        </div>
                    </div>
                `).join('');
                document.getElementById('btn-checkout').classList.remove('hidden');
            }
            
            document.getElementById('cart-total').innerText = `฿${total.toLocaleString()}`;
            document.getElementById('checkout-total').innerText = `(฿${total.toLocaleString()})`;
        }

        function toggleSlipUpload() {
            const method = document.getElementById('payment-method').value;
            document.getElementById('slip-upload-section').style.display = method === 'Bank Transfer' ? 'block' : 'none';
        }

        async function submitOrder(e) {
            e.preventDefault();
            const name = document.getElementById('cust-name').value;
            const address = document.getElementById('cust-address').value;
            const method = document.getElementById('payment-method').value;

            const orderData = { customer_name: name, address: address, payment_method: method, total_amount: total, cart_items: cart };

            try {
                const res = await fetch('/api/orders', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(orderData)
                });
                
                if(res.ok) {
                    const data = await res.json();
                    document.getElementById('success-id').innerText = `#ORD-${data.order_id.toString().padStart(4, '0')}`;
                    document.getElementById('success-status').innerText = data.status;
                    
                    cart = [];
                    updateCartUI();
                    showSection('success');
                }
            } catch (err) { alert("Error placing order."); }
        }
    </script>
</body>
</html>
