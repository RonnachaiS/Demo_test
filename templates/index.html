<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sandy Stuvik | Official Demo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* บังคับไม่ให้เกิดการเลื่อนซ้าย-ขวาอย่างเด็ดขาด */
        html, body {
            overflow-x: hidden;
            width: 100%;
            position: relative;
        }
    </style>
</head>
<body class="bg-zinc-900 text-white font-sans antialiased min-h-screen flex flex-col overflow-x-hidden">

    <nav class="bg-black/90 backdrop-blur-md fixed w-full z-50 border-b border-red-600/30">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex items-center justify-between h-16">
                <div class="flex-shrink-0 cursor-pointer" onclick="showSection('home')">
                    <span class="font-bold text-lg md:text-xl tracking-wider uppercase text-red-500">Sandy<span class="text-white ml-1">Stuvik</span></span>
                </div>
                
                <div class="flex items-center space-x-4 md:space-x-8">
                    <div class="flex items-center space-x-3 md:space-x-6">
                        <button onclick="showSection('home')" id="nav-home" class="text-red-500 uppercase text-xs md:text-sm font-bold tracking-wide transition-colors">News</button>
                        <button onclick="showSection('shop')" id="nav-shop" class="text-gray-400 hover:text-white uppercase text-xs md:text-sm font-bold tracking-wide transition-colors">Shop</button>
                    </div>
                    <div class="hidden md:block h-6 w-px bg-zinc-700"></div>
                    <button onclick="showSection('cart')" class="relative flex items-center justify-center bg-zinc-800 hover:bg-red-600 text-white px-3 py-2 rounded-md transition-all active:scale-95 border border-zinc-700 hover:border-red-500">
                        <svg class="w-5 h-5 md:mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
                        <span class="hidden md:block text-sm font-bold uppercase">Cart</span> 
                        <span id="cart-count" class="absolute -top-2 -right-2 bg-red-500 text-white text-[10px] font-bold w-5 h-5 flex items-center justify-center rounded-full shadow-md">0</span>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <main class="relative w-full flex-grow pt-16 overflow-hidden min-h-screen">
        
        <section id="section-home" class="absolute top-0 left-0 w-full transition-all duration-500 ease-in-out transform translate-x-0 opacity-100 z-10 pb-20">
            <div class="relative py-20 md:py-32 overflow-hidden border-b border-zinc-800">
                <img src="https://images.unsplash.com/photo-1568605117036-5fe5e7bab0b7?auto=format&fit=crop&w=2070&q=80" class="absolute inset-0 w-full h-full object-cover opacity-20">
                <div class="relative z-20 max-w-7xl mx-auto px-4 text-center">
                    <h1 class="text-4xl sm:text-5xl md:text-7xl font-black uppercase tracking-tighter text-white drop-shadow-lg">
                        Triple TSS <br class="md:hidden"><span class="text-red-600">Champion</span>
                    </h1>
                </div>
            </div>
            <div class="max-w-7xl mx-auto px-4 py-12 md:py-16">
                <div class="flex items-center mb-8">
                    <div class="w-1 h-8 bg-red-600 mr-4"></div>
                    <h2 class="text-2xl md:text-3xl font-bold uppercase tracking-wide">Latest News</h2>
                </div>
                <div id="news-container" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 md:gap-8"></div>
            </div>
        </section>

        <section id="section-shop" class="hidden absolute top-0 left-0 w-full transition-all duration-500 ease-in-out transform translate-x-full opacity-0 pointer-events-none z-0 pb-20">
            <div class="max-w-7xl mx-auto px-4 py-12 md:py-16">
                <div class="flex items-center mb-8">
                    <div class="w-2 h-10 bg-red-600 mr-4"></div>
                    <h1 class="text-3xl md:text-4xl font-black uppercase tracking-wide">Merchandise</h1>
                </div>
                <div id="product-container" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 md:gap-8"></div>
            </div>
        </section>

        <section id="section-cart" class="hidden absolute top-0 left-0 w-full transition-all duration-500 ease-in-out transform translate-x-full opacity-0 pointer-events-none z-0 pb-20">
            <div class="max-w-4xl mx-auto px-4 py-12 md:py-16">
                <h1 class="text-2xl md:text-3xl font-black uppercase mb-6 md:mb-8 border-b border-zinc-700 pb-4">Your Cart</h1>
                <div id="cart-items-container" class="space-y-4 mb-8"></div>
                <div class="bg-zinc-800 p-6 md:p-8 rounded-xl border border-zinc-700 shadow-xl">
                    <div class="flex flex-col md:flex-row justify-between items-end md:items-center">
                        <div class="mb-4 md:mb-0 text-left w-full md:w-auto">
                            <p class="text-sm md:text-base text-gray-400 uppercase tracking-widest font-bold">Total Amount</p>
                            <p id="cart-total" class="text-4xl md:text-5xl font-black text-red-500 mt-1">฿0</p>
                        </div>
                        <button onclick="showSection('checkout')" id="btn-checkout" class="w-full md:w-auto bg-red-600 hover:bg-red-700 text-white font-bold py-4 px-8 rounded-lg uppercase tracking-wider transition-colors hidden shadow-lg shadow-red-600/20 active:scale-95">Checkout &rarr;</button>
                    </div>
                </div>
            </div>
        </section>

        <section id="section-checkout" class="hidden absolute top-0 left-0 w-full transition-all duration-500 ease-in-out transform translate-x-full opacity-0 pointer-events-none z-0 pb-20">
            <div class="max-w-2xl mx-auto px-4 py-12 md:py-16">
                <div class="flex items-center mb-8">
                    <div class="w-2 h-8 bg-red-600 mr-4"></div>
                    <h1 class="text-2xl md:text-3xl font-black uppercase tracking-wide">Checkout</h1>
                </div>
                <form id="checkout-form" onsubmit="submitOrder(event)" class="bg-zinc-800 p-6 md:p-8 rounded-xl border border-zinc-700 space-y-6 shadow-xl">
                    <div>
                        <label class="block text-gray-400 text-xs md:text-sm font-bold uppercase tracking-wider mb-2">Full Name</label>
                        <input type="text" id="cust-name" required class="w-full bg-zinc-900/50 text-white border border-zinc-700 rounded-lg p-3 md:p-4 focus:border-red-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-gray-400 text-xs md:text-sm font-bold uppercase tracking-wider mb-2">Shipping Address</label>
                        <textarea id="cust-address" required rows="3" class="w-full bg-zinc-900/50 text-white border border-zinc-700 rounded-lg p-3 md:p-4 focus:border-red-500 outline-none"></textarea>
                    </div>
                    <div>
                        <label class="block text-gray-400 text-xs md:text-sm font-bold uppercase tracking-wider mb-2">Payment Method</label>
                        <select id="payment-method" onchange="toggleSlipUpload()" class="w-full bg-zinc-900/50 text-white border border-zinc-700 rounded-lg p-3 md:p-4 focus:border-red-500 outline-none">
                            <option value="Bank Transfer">Bank Transfer (QR PromptPay)</option>
                            <option value="Credit Card">Credit Card (Demo)</option>
                        </select>
                    </div>
                    <div id="slip-upload-section" class="bg-zinc-900/80 p-6 rounded-lg border-2 border-dashed border-zinc-600 text-center">
                        <div class="mb-4">
                            <p class="text-red-500 font-black text-lg md:text-xl uppercase tracking-widest">PromptPay</p>
                            <p class="text-white font-mono text-xl md:text-2xl tracking-widest mt-1">08X-XXX-XXXX</p>
                        </div>
                        <label class="block text-gray-400 text-xs md:text-sm mb-4">Please upload your transfer slip</label>
                        <input type="file" id="slip-file" accept="image/*" class="w-full text-xs text-gray-400 file:mr-4 file:py-2.5 file:px-4 file:rounded-md file:border-0 file:font-bold file:uppercase file:bg-red-600 file:text-white cursor-pointer">
                    </div>
                    <button type="submit" class="w-full bg-red-600 hover:bg-red-700 text-white font-black py-4 rounded-lg uppercase tracking-wider transition-all text-lg shadow-lg shadow-red-600/20 active:scale-95 mt-8">Confirm Payment <span id="checkout-total" class="opacity-80 font-normal ml-2"></span></button>
                </form>
            </div>
        </section>

        <section id="section-success" class="hidden absolute top-0 left-0 w-full transition-all duration-500 ease-in-out transform translate-x-full opacity-0 pointer-events-none z-0 pb-20">
            <div class="max-w-xl mx-auto px-4 py-24 text-center">
                <div class="w-24 h-24 bg-green-500 rounded-full flex items-center justify-center mx-auto mb-8 shadow-xl shadow-green-500/20">
                    <svg class="w-12 h-12 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
                </div>
                <h1 class="text-3xl md:text-5xl font-black uppercase tracking-tighter mb-4">Success!</h1>
                <p class="text-lg text-gray-400 mb-10">We have received your order.</p>
                <button onclick="showSection('shop')" class="w-full sm:w-auto bg-zinc-800 hover:bg-zinc-700 border border-zinc-600 text-white font-bold py-4 px-10 rounded-lg uppercase tracking-wider transition-all shadow-lg">Back to Shop</button>
            </div>
        </section>

    </main>

    <script>
        let cart = [];
        let total = 0;
        const sections = ['home', 'shop', 'cart', 'checkout', 'success'];

        document.addEventListener('DOMContentLoaded', async () => {
            loadNews();
            loadProducts();
        });

        // --- ระบบนำทางฉบับแก้บัค Horizontal Scroll ---
        function showSection(targetId) {
            sections.forEach(id => {
                const el = document.getElementById(`section-${id}`);
                if (id === targetId) {
                    // แสดง Section ที่ต้องการ
                    el.classList.remove('hidden');
                    // ใช้ setTimeout เล็กน้อยเพื่อให้เบราว์เซอร์ลบ hidden ทันก่อนรัน animation
                    setTimeout(() => {
                        el.classList.replace('translate-x-full', 'translate-x-0') || el.classList.replace('-translate-x-full', 'translate-x-0');
                        el.classList.replace('opacity-0', 'opacity-100');
                        el.classList.remove('pointer-events-none', 'z-0');
                        el.classList.add('z-10');
                    }, 50);
                } else {
                    // ซ่อน Section อื่น
                    const isLeft = sections.indexOf(id) < sections.indexOf(targetId);
                    el.classList.replace('translate-x-0', isLeft ? '-translate-x-full' : 'translate-x-full');
                    el.classList.replace('opacity-100', 'opacity-0');
                    el.classList.add('pointer-events-none', 'z-0');
                    el.classList.remove('z-10');
                    
                    // หน่วงเวลาให้แอนิเมชันสไลด์จบก่อน แล้วค่อยใส่ hidden เพื่อซ่อนทิ้งไปเลย
                    setTimeout(() => {
                        if (!el.classList.contains('opacity-100')) {
                            el.classList.add('hidden');
                        }
                    }, 500); // 500ms ตรงกับ duration-500
                }
            });
            window.scrollTo({ top: 0, behavior: 'smooth' });
            
            if(targetId === 'home' || targetId === 'shop') {
                document.getElementById('nav-home').className = targetId === 'home' 
                    ? "text-red-500 uppercase text-xs md:text-sm font-bold tracking-wide transition-colors" 
                    : "text-gray-400 hover:text-white uppercase text-xs md:text-sm font-bold tracking-wide transition-colors";
                document.getElementById('nav-shop').className = targetId === 'shop' 
                    ? "text-red-500 uppercase text-xs md:text-sm font-bold tracking-wide transition-colors" 
                    : "text-gray-400 hover:text-white uppercase text-xs md:text-sm font-bold tracking-wide transition-colors";
            }
        }

        async function loadNews() {
            try {
                const res = await fetch('/api/news');
                const news = await res.json();
                document.getElementById('news-container').innerHTML = news.map(n => `
                    <div class="bg-zinc-800/80 rounded-xl overflow-hidden border border-zinc-700 shadow-lg group cursor-pointer w-full">
                        <div class="overflow-hidden w-full">
                            <img src="${n.image_url}" class="w-full h-48 md:h-56 object-cover group-hover:scale-105 transition-transform duration-700">
                        </div>
                        <div class="p-6">
                            <h3 class="font-bold mb-3 text-lg md:text-xl leading-tight">${n.title}</h3>
                            <p class="text-sm text-gray-400 line-clamp-3">${n.content}</p>
                        </div>
                    </div>`).join('');
            } catch (e) {}
        }

        async function loadProducts() {
            try {
                const res = await fetch('/api/products');
                const products = await res.json();
                document.getElementById('product-container').innerHTML = products.map(p => `
                    <div class="bg-zinc-800/80 border border-zinc-700 rounded-xl overflow-hidden shadow-lg w-full">
                        <div class="h-48 md:h-64 bg-zinc-100 p-6 flex justify-center items-center">
                            <img src="${p.image_url}" class="max-w-full max-h-full object-contain mix-blend-multiply">
                        </div>
                        <div class="p-5 md:p-6">
                            <h3 class="font-bold uppercase mb-4 text-sm md:text-base tracking-wide h-10 line-clamp-2">${p.name}</h3>
                            <div class="flex justify-between items-center mt-2">
                                <span class="text-xl md:text-2xl font-black text-red-500">฿${p.price.toLocaleString()}</span>
                                <button onclick="addToCart(${p.id}, '${p.name}', ${p.price}, '${p.image_url}')" class="bg-zinc-700 text-white text-xs font-bold px-4 py-2.5 rounded hover:bg-red-600 transition-colors uppercase">Add</button>
                            </div>
                        </div>
                    </div>`).join('');
            } catch (e) {}
        }

        function addToCart(id, name, price, img) {
            cart.push({ id, name, price, img });
            updateCartUI();
            const btn = document.getElementById('cart-count');
            btn.classList.add('scale-150', 'bg-white', 'text-red-500');
            setTimeout(() => btn.classList.remove('scale-150', 'bg-white', 'text-red-500'), 200);
        }

        function removeFromCart(index) {
            cart.splice(index, 1);
            updateCartUI();
        }

        function updateCartUI() {
            document.getElementById('cart-count').innerText = cart.length;
            total = cart.reduce((sum, item) => sum + item.price, 0);
            
            const container = document.getElementById('cart-items-container');
            if (cart.length === 0) {
                container.innerHTML = '<p class="text-zinc-400 font-bold text-center py-8">Your cart is empty</p>';
                document.getElementById('btn-checkout').classList.add('hidden');
            } else {
                container.innerHTML = cart.map((item, index) => `
                    <div class="flex items-center justify-between bg-zinc-800 p-4 rounded-xl border border-zinc-700">
                        <div class="flex items-center flex-1 min-w-0 pr-4">
                            <img src="${item.img}" class="w-16 h-16 bg-zinc-100 rounded-lg p-2 mr-4 object-contain">
                            <p class="font-bold text-sm md:text-base truncate">${item.name}</p>
                        </div>
                        <div class="flex items-center shrink-0">
                            <span class="text-red-500 font-black mr-4">฿${item.price.toLocaleString()}</span>
                            <button onclick="removeFromCart(${index})" class="text-zinc-500 hover:text-red-500 text-2xl">&times;</button>
                        </div>
                    </div>`).join('');
                document.getElementById('btn-checkout').classList.remove('hidden');
            }
            document.getElementById('cart-total').innerText = `฿${total.toLocaleString()}`;
            document.getElementById('checkout-total').innerText = `(฿${total.toLocaleString()})`;
        }

        function toggleSlipUpload() {
            const method = document.getElementById('payment-method').value;
            document.getElementById('slip-upload-section').style.display = method === 'Bank Transfer' ? 'block' : 'none';
        }

        async function submitOrder(e) {
            e.preventDefault();
            // ... (โค้ด Submit เหมือนเดิม ขอย่อเพื่อให้สั้นลง)
            showSection('success');
        }
    </script>
</body>
</html>
