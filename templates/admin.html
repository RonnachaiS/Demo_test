<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin Dashboard | Sandy Stuvik</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        html, body { overflow-x: hidden; width: 100%; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade { animation: fadeIn 0.4s ease-out forwards; }
    </style>
</head>
<body class="bg-zinc-950 text-white font-sans antialiased min-h-screen flex flex-col">

    <div id="login-screen" class="absolute inset-0 bg-zinc-950 flex items-center justify-center z-50 transition-opacity duration-500">
        <div class="bg-zinc-900 border border-zinc-800 p-8 rounded-2xl shadow-2xl w-96 max-w-[90%] text-center">
            <div class="w-16 h-16 bg-red-600/10 text-red-500 rounded-full flex items-center justify-center mx-auto mb-4 border border-red-500/20">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
            </div>
            <h1 class="text-2xl font-black uppercase text-white mb-2">Admin <span class="text-red-500">Access</span></h1>
            <p class="text-sm text-zinc-500 mb-8">Please enter the master password</p>
            
            <form onsubmit="handleLogin(event)" class="space-y-4">
                <input type="password" id="admin-pass" placeholder="Password (1234)" required class="w-full p-4 bg-zinc-950 border border-zinc-700 rounded-xl outline-none focus:border-red-500 text-white text-center tracking-widest text-lg transition-all">
                <p id="login-error" class="text-red-500 text-xs font-bold hidden">Incorrect Password!</p>
                <button type="submit" class="w-full bg-red-600 text-white font-black uppercase tracking-wider py-4 rounded-xl hover:bg-red-700 transition-all shadow-lg shadow-red-600/20 active:scale-95">Login to Dashboard</button>
            </form>
            <a href="/" class="block mt-6 text-sm text-zinc-500 hover:text-white transition-colors">&larr; Back to Website</a>
        </div>
    </div>

    <div id="admin-app" class="hidden flex-col min-h-screen">
        
        <nav class="bg-black/80 backdrop-blur-md border-b border-zinc-800 sticky top-0 z-40 shadow-md">
            <div class="max-w-7xl mx-auto px-4">
                <div class="flex items-center justify-between h-16">
                    <div class="flex-shrink-0 mr-4">
                        <span class="font-black text-lg md:text-xl tracking-wider uppercase text-red-600">Admin<span class="text-white ml-1">Panel</span></span>
                    </div>
                    
                    <div class="flex items-center flex-1 justify-end min-w-0">
                        <div class="flex items-center space-x-2 md:space-x-4 overflow-x-auto no-scrollbar py-2 pr-2">
                            <button onclick="switchTab('news')" id="tab-news" class="bg-red-500/10 text-red-500 border border-red-500/20 px-4 py-2 rounded-lg text-xs md:text-sm font-bold whitespace-nowrap transition-colors">📰 News</button>
                            <button onclick="switchTab('shop')" id="tab-shop" class="text-zinc-400 hover:text-white hover:bg-zinc-800 px-4 py-2 rounded-lg text-xs md:text-sm font-bold whitespace-nowrap transition-colors border border-transparent">🛍️ Shop</button>
                            <button onclick="switchTab('orders')" id="tab-orders" class="text-zinc-400 hover:text-white hover:bg-zinc-800 px-4 py-2 rounded-lg text-xs md:text-sm font-bold whitespace-nowrap transition-colors border border-transparent">📦 Orders</button>
                        </div>
                        
                        <div class="hidden md:block h-6 w-px bg-zinc-700 mx-3"></div>
                        
                        <button onclick="logout()" class="flex-shrink-0 ml-2 text-zinc-500 hover:text-red-500 p-2 rounded-full transition-colors" title="Logout">
                            <svg class="w-5 h-5 md:w-6 md:h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
                        </button>
                    </div>
                </div>
            </div>
        </nav>

        <main class="w-full flex-grow pt-8 px-4 pb-20 max-w-7xl mx-auto">
            
            <section id="sec-news" class="block w-full animate-fade">
                <div class="flex items-center justify-between mb-6">
                    <h1 class="text-2xl md:text-3xl font-black text-white">Manage News</h1>
                </div>
                
                <div class="bg-zinc-800 p-6 md:p-8 rounded-2xl shadow-xl border border-zinc-700 mb-8">
                    <h2 class="text-sm font-bold text-zinc-400 uppercase tracking-wider mb-5 flex items-center"><span class="w-2 h-2 rounded-full bg-red-500 mr-2"></span> Add New Article</h2>
                    <form onsubmit="addNews(event)" class="space-y-4">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <input type="text" id="n-title" placeholder="News Title" required class="w-full p-4 bg-zinc-900 border border-zinc-700 rounded-xl outline-none focus:border-red-500 text-white placeholder-zinc-500 transition-colors">
                            <input type="text" id="n-img" placeholder="Image URL" required class="w-full p-4 bg-zinc-900 border border-zinc-700 rounded-xl outline-none focus:border-red-500 text-white placeholder-zinc-500 transition-colors">
                        </div>
                        <textarea id="n-content" placeholder="Content Details" required rows="3" class="w-full p-4 bg-zinc-900 border border-zinc-700 rounded-xl outline-none focus:border-red-500 text-white placeholder-zinc-500 transition-colors"></textarea>
                        <button type="submit" class="bg-red-600 text-white font-bold py-3 px-8 rounded-xl hover:bg-red-700 transition-colors shadow-lg shadow-red-600/20 active:scale-95">Publish News</button>
                    </form>
                </div>

                <div class="bg-zinc-800 rounded-2xl shadow-xl border border-zinc-700 overflow-hidden">
                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse min-w-[600px]">
                            <thead><tr class="bg-zinc-900/50 text-zinc-400 text-xs uppercase tracking-wider border-b border-zinc-700"><th class="p-5">Image</th><th class="p-5 w-1/2">Title</th><th class="p-5 text-right">Actions</th></tr></thead>
                            <tbody id="admin-news-list"></tbody>
                        </table>
                    </div>
                </div>
            </section>

            <section id="sec-shop" class="hidden w-full animate-fade">
                <h1 class="text-2xl md:text-3xl font-black text-white mb-6">Manage Shop</h1>
                
                <div class="bg-zinc-800 p-6 md:p-8 rounded-2xl shadow-xl border border-zinc-700 mb-8">
                    <h2 class="text-sm font-bold text-zinc-400 uppercase tracking-wider mb-5 flex items-center"><span class="w-2 h-2 rounded-full bg-red-500 mr-2"></span> Add New Product</h2>
                    <form onsubmit="addProduct(event)" class="space-y-4">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <input type="text" id="p-name" placeholder="Product Name" required class="p-4 bg-zinc-900 border border-zinc-700 rounded-xl outline-none focus:border-red-500 text-white placeholder-zinc-500">
                            <input type="number" id="p-price" placeholder="Price (THB)" required class="p-4 bg-zinc-900 border border-zinc-700 rounded-xl outline-none focus:border-red-500 text-white placeholder-zinc-500">
                        </div>
                        <input type="text" id="p-img" placeholder="Image URL" required class="w-full p-4 bg-zinc-900 border border-zinc-700 rounded-xl outline-none focus:border-red-500 text-white placeholder-zinc-500">
                        <textarea id="p-desc" placeholder="Description" required rows="2" class="w-full p-4 bg-zinc-900 border border-zinc-700 rounded-xl outline-none focus:border-red-500 text-white placeholder-zinc-500"></textarea>
                        <button type="submit" class="bg-red-600 text-white font-bold py-3 px-8 rounded-xl hover:bg-red-700 transition-colors shadow-lg shadow-red-600/20 active:scale-95">Add Product</button>
                    </form>
                </div>

                <div class="bg-zinc-800 rounded-2xl shadow-xl border border-zinc-700 overflow-hidden">
                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse min-w-[600px]">
                            <thead><tr class="bg-zinc-900/50 text-zinc-400 text-xs uppercase tracking-wider border-b border-zinc-700"><th class="p-5">Item</th><th class="p-5">Price</th><th class="p-5 text-right">Actions</th></tr></thead>
                            <tbody id="admin-product-list"></tbody>
                        </table>
                    </div>
                </div>
            </section>

            <section id="sec-orders" class="hidden w-full animate-fade">
                <h1 class="text-2xl md:text-3xl font-black text-white mb-6">Customer Orders</h1>
                
                <div class="bg-zinc-800 rounded-2xl shadow-xl border border-zinc-700 overflow-hidden">
                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse min-w-[800px]">
                            <thead><tr class="bg-zinc-900/50 text-zinc-400 text-xs uppercase tracking-wider border-b border-zinc-700"><th class="p-5">Order ID</th><th class="p-5">Customer Details</th><th class="p-5">Total</th><th class="p-5">Status</th><th class="p-5 text-right">Update</th></tr></thead>
                            <tbody id="admin-order-list"></tbody>
                        </table>
                    </div>
                </div>
            </section>

        </main>
    </div>

    <script>
        const tabs = ['news', 'shop', 'orders'];

        // --- LOGIN LOGIC ---
        function handleLogin(e) {
            e.preventDefault();
            const pass = document.getElementById('admin-pass').value;
            if(pass === '1234') { 
                document.getElementById('login-error').classList.add('hidden');
                document.getElementById('login-screen').classList.add('opacity-0', 'pointer-events-none');
                setTimeout(() => {
                    document.getElementById('login-screen').classList.add('hidden');
                    document.getElementById('admin-app').classList.remove('hidden');
                    document.getElementById('admin-app').classList.add('flex');
                    sessionStorage.setItem('isAdmin', 'true');
                    loadNews(); 
                }, 500);
            } else {
                document.getElementById('login-error').classList.remove('hidden');
            }
        }

        function logout() {
            sessionStorage.removeItem('isAdmin');
            location.reload();
        }

        window.onload = () => {
            if(sessionStorage.getItem('isAdmin') === 'true') {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('admin-app').classList.remove('hidden');
                document.getElementById('admin-app').classList.add('flex');
                loadNews();
            }
        };

        // --- NAVIGATION LOGIC ---
        function switchTab(target) {
            tabs.forEach(tab => {
                const section = document.getElementById(`sec-${tab}`);
                const btn = document.getElementById(`tab-${tab}`);
                
                if (tab === target) {
                    section.classList.remove('hidden');
                    section.classList.add('block', 'animate-fade');
                    btn.className = 'bg-red-500/10 text-red-500 border border-red-500/20 px-4 py-2 rounded-lg text-xs md:text-sm font-bold whitespace-nowrap transition-colors';
                } else {
                    section.classList.add('hidden');
                    section.classList.remove('block', 'animate-fade');
                    btn.className = 'text-zinc-400 hover:text-white hover:bg-zinc-800 border border-transparent px-4 py-2 rounded-lg text-xs md:text-sm font-bold whitespace-nowrap transition-colors';
                }
            });
            window.scrollTo({ top: 0, behavior: 'smooth' });
            
            if(target === 'news') loadNews();
            if(target === 'shop') loadProducts();
            if(target === 'orders') loadOrders();
        }

        // --- API INTEGRATION ---
        
        // 1. NEWS
        async function loadNews() {
            const res = await fetch('/api/news');
            const data = await res.json();
            document.getElementById('admin-news-list').innerHTML = data.map(item => `
                <tr class="hover:bg-zinc-700/30 transition-colors border-b border-zinc-700/50">
                    <td class="p-4"><img src="${item.image_url}" class="w-20 h-14 object-cover rounded-lg border border-zinc-600"></td>
                    <td class="p-4 font-bold text-sm text-gray-200">${item.title}</td>
                    <td class="p-4 text-right"><button onclick="deleteNews(${item.id})" class="text-red-400 hover:text-white hover:bg-red-600 border border-red-900/50 text-xs font-bold px-4 py-2 rounded-lg transition-colors active:scale-95">Remove</button></td>
                </tr>
            `).join('');
        }
        async function addNews(e) {
            e.preventDefault();
            const btn = e.target.querySelector('button'); btn.innerHTML = 'Publishing...';
            await fetch('/api/news', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({title: document.getElementById('n-title').value, image_url: document.getElementById('n-img').value, content: document.getElementById('n-content').value}) });
            e.target.reset(); btn.innerHTML = 'Publish News'; loadNews();
        }
        async function deleteNews(id) { if(confirm('Delete this article?')) { await fetch(`/api/news/${id}`, { method: 'DELETE' }); loadNews(); } }

        // 2. SHOP
        async function loadProducts() {
            const res = await fetch('/api/products');
            const data = await res.json();
            document.getElementById('admin-product-list').innerHTML = data.map(item => `
                <tr class="hover:bg-zinc-700/30 transition-colors border-b border-zinc-700/50">
                    <td class="p-4 flex items-center min-w-[200px]">
                        <div class="w-14 h-14 bg-zinc-100 rounded-lg p-1 mr-4 border border-zinc-600 flex items-center justify-center">
                            <img src="${item.image_url}" class="max-w-full max-h-full object-contain mix-blend-multiply">
                        </div>
                        <span class="font-bold text-sm text-gray-200">${item.name}</span>
                    </td>
                    <td class="p-4 font-black text-sm text-red-500">฿${item.price}</td>
                    <td class="p-4 text-right"><button onclick="deleteProduct(${item.id})" class="text-red-400 hover:text-white hover:bg-red-600 border border-red-900/50 text-xs font-bold px-4 py-2 rounded-lg transition-colors active:scale-95">Remove</button></td>
                </tr>
            `).join('');
        }
        async function addProduct(e) {
            e.preventDefault();
            const btn = e.target.querySelector('button'); btn.innerHTML = 'Adding...';
            await fetch('/api/products', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({name: document.getElementById('p-name').value, price: parseFloat(document.getElementById('p-price').value), image_url: document.getElementById('p-img').value, description: document.getElementById('p-desc').value}) });
            e.target.reset(); btn.innerHTML = 'Add Product'; loadProducts();
        }
        async function deleteProduct(id) { if(confirm('Delete this product?')) { await fetch(`/api/products/${id}`, { method: 'DELETE' }); loadProducts(); } }

        // 3. ORDERS
        async function loadOrders() {
            const res = await fetch('/api/orders');
            const data = await res.json();
            document.getElementById('admin-order-list').innerHTML = data.length > 0 ? data.map(o => `
                <tr class="hover:bg-zinc-700/30 transition-colors border-b border-zinc-700/50">
                    <td class="p-4 font-mono font-bold text-zinc-500 text-xs">#ORD-${o.id.toString().padStart(4,'0')}</td>
                    <td class="p-4">
                        <p class="font-bold text-sm text-gray-200">${o.customer_name}</p>
                        <p class="text-xs text-zinc-400 mt-1 max-w-xs truncate">${o.address}</p>
                    </td>
                    <td class="p-4 font-black text-red-500 text-sm">฿${o.total_amount}</td>
                    <td class="p-4">
                        <span class="px-3 py-1.5 text-[10px] uppercase tracking-wider font-bold rounded-md ${o.status === 'Shipped' ? 'bg-green-500/20 text-green-400 border border-green-500/30' : 'bg-yellow-500/20 text-yellow-400 border border-yellow-500/30'}">${o.status}</span>
                    </td>
                    <td class="p-4 text-right">
                        ${o.status !== 'Shipped' ? `<button onclick="updateOrderStatus(${o.id}, 'Shipped')" class="text-blue-400 hover:text-white hover:bg-blue-600 border border-blue-900/50 font-bold px-3 py-1.5 rounded-lg text-xs transition-colors active:scale-95">Mark Shipped</button>` : `<span class="text-zinc-500 text-xs font-bold uppercase"><svg class="w-4 h-4 inline mr-1 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>Done</span>`}
                    </td>
                </tr>
            `).join('') : '<tr><td colspan="5" class="p-8 text-center text-zinc-500 font-bold uppercase tracking-widest text-sm border-b border-zinc-700/50">No orders yet</td></tr>';
        }
        async function updateOrderStatus(id, newStatus) { 
            await fetch(`/api/orders/${id}`, { method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify({status: newStatus}) }); 
            loadOrders(); 
        }
    </script>
</body>
</html>
